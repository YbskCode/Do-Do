<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>



<body>

    <div id="loading-overlay" class="slide-overlay"></div>

    <button id="goBackBtn" class="go-back-btn">
        <i class="fa-solid fa-arrow-left"></i>
    </button>

    <div class="header-auth-container">
        <div class="header-auth header-auth--wide">
            <p id="userEmailDisplay" class="user-info"></p>
            <div class="header-actions">
                <button type="button" id="directToBuddiesBtn" class="headerIconBtn" title="Buddies"
                    aria-label="Buddies">
                    <i class="fa-solid fa-user-group"></i>
                </button>
                <button type="button" id="directToMessagesBtn" class="headerIconBtn" title="Messages"
                    aria-label="Messages">
                    <i class="fa-solid fa-comments"></i>
                </button>
                <button id="darkModeBtn" class="darkModeBtn">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button id="logoutBtn" class="logoutBtn">
                    Logout <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="todoApp">

            <div class="taskManagerDiv">
                <button class="taskManagerButton activeFilter" id="filterAll">All</button>
                <button class="taskManagerButton" id="filterActive">Active</button>
                <button class="taskManagerButton" id="filterCompleted">Completed</button>
            </div>


            <h1>To - Do</h1>
            <p id="motivationalQuote" class="motivationalQuote"></p>

            <form class="inputArea">
                <input type="text" id="taskInput" placeholder="Add a new task...">
                <button type="submit" id="addTaskBtn">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </form>



            <div class="todosContainer">
                <div id="tasksLoadingSpinner" class="loadingSpinner">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>Loading tasks...</p>
                </div>
                <ul id="taskList">
                </ul>
                <img class="emptyImg" src="images/emptyImgg.png" alt="empty">
            </div>

        </div>
    </div>


    <script src="config.js"></script>
    <script src="presence.js"></script>
    <script src="notifications.js"></script>
    <script src="script.js"></script>
    <script src="registerLoginScript.js"></script>
    <script src="darkMode.js"></script>
    <script src="motivationalQuotes.js"></script>
</body>



</html>
