<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>

    <link rel="stylesheet" href="registerLoginStyle.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

    <div id="loading-overlay" class="slide-overlay"></div>

    <div class="container">

        <button id="darkModeBtn" class="darkModeBtn" style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
            <i class="fa-solid fa-moon"></i>
        </button>

        <div class="formBox">

            <h1>Login</h1>

            <form class="inputArea" id="loginForm" action="">
                <input type="email" id="loginEmail" name="email" placeholder="Email" required>
                <input type="password" id="loginPassword" name="password" placeholder="Password" required>
                <button type="submit" id="loginBtn" name="login">Login</button>
                <p>Don't have an account? <a href="register.html">Register</a></p>
            </form>
        </div>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="registerLoginScript.js"></script>
    <script src="darkMode.js"></script>
</body>

</html>
