<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        #long-break-timer,
        #short-break-timer {
            display: none;
        }

        #pomodoro-timer {
            display: block;
        }
    </style>

</head>


<body>



    <button id="goBackBtn" class="go-back-btn">
        <i class="fa-solid fa-arrow-left"></i>
    </button>


    <div class="header-auth-container">
        <div class="header-auth">
            <p id="userEmailDisplay" class="user-info"></p>
            <button id="darkModeBtn" class="darkModeBtn">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button id="logoutBtn" class="logoutBtn">
                Logout <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
    </div>



    <div class="container pomodoroContainer">

        <div class="taskSelectorContainer">
            <label for="activeTaskSelect">Working on:</label>
            <select id="activeTaskSelect">
                <option value="">-- No Task Selected --</option>
            </select>

            <p id="taskTimeDisplay" style="display: none;">
                Time spent: <span id="timeSpentValue">0</span> minutes
            </p>
        </div>

        <div class="todoApp pomodoroApp">

            <h1>Pomodoro</h1>

            <div class="buttonContainer">
                <button class="pomodoroButton activeFilter" id="pomodoro-session"
                    data-target-id="pomodoro-timer">Pomodoro</button>
                <button class="pomodoroButton" id="short-break-session" data-target-id="short-break-timer">Short
                    Break</button>
                <button class="pomodoroButton" id="long-break-session" data-target-id="long-break-timer">Long
                    Break</button>
            </div>

            <main>
                <div class="pomodoro">

                    <h1 id="pomodoro-timer" class="timer-display" data-duration="25">25.00</h1>
                    <h1 id="long-break-timer" class="timer-display" data-duration="10">10.00</h1>
                    <h1 id="short-break-timer" class="timer-display" data-duration="5">5.00</h1>

                </div>
            </main>

            <div class="buttons">
                <button class="pomodoroButton start-stop-btn" id="start">START</button>
                <button class="pomodoroButton start-stop-btn" id="stop">STOP</button>
                <button id="stop-alarm-btn" class="pomodoroButton start-stop-btn" style="display: none;">
                    REWIND
                </button>
            </div>

        </div>

        <div class="analyticsContainer">

            <!-- Nature Sounds -->
            <div class="soundContainer">
                <label>Nature Sounds</label>
                <select id="soundSelect">
                    <option value="">-- Select Sound --</option>
                    <option value="sounds/rain.mp3">🌧️ Rain</option>
                    <option value="sounds/whitenoise.mp3">🌊 White Noise</option>
                    <option value="sounds/lofi.mp3">🎵 Lofi Chill</option>
                </select>
                <button id="soundToggleBtn" class="pomodoroButton">
                    <i class="fa-solid fa-play"></i> Play
                </button>
            </div>

            <label for="activeTaskSelect">Show Analytics</label>
            <button id="openAnalyticsBtn" class="pomodoroButton analyticsButton">
                <i class="fa-solid fa-chart-simple"></i>
            </button>
        </div>

    </div>

    <audio id="alarm-sound" src="src/alexis_gaming_cam-bell-notification-337658.mp3" loop></audio>



    <div id="analyticsModal" class="glassModalOverlay" style="display: none;">
        <div class="glassModalContent">
            <button id="closeAnalyticsBtn" class="closeModalBtn">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <h2>Focus Analytics</h2>


            <div id="analyticsLoadingSpinner" class="loadingSpinner">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <p>Loading analytics...</p>
            </div>

            <div class="kpiContainer">
                <div class="kpiCard">
                    <h3>Total Focus Time</h3>
                    <p id="totalFocusTimeDisplay">0 minutes</p>
                </div>
            </div>
            <div class="kpiContainer">
                <div class="kpiCard">
                    <h3>Most Time Spent Task</h3>
                    <p id="mostTimeSpentTask">No Task</p>
                    <p id="mostTimeSpentTaskTime">0 minutes</p>
                </div>
            </div>


            <div class="chartContainer">
                <canvas id="focusChart"></canvas>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="pomodoroScripts.js"></script>
    <script src="registerLoginScript.js"></script>
    <script src="darkmode.js"></script>
    <script src="soundPlayer.js"></script>

</body>








</html>
